version: "3.9"

# ── SquadMind Local Development Stack ────────────────────────────────────────
# Usage: docker compose up -d
# Then run: uvicorn main:app --reload

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: squadmind_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: squadmind
      POSTGRES_USER: squadmind_user
      POSTGRES_PASSWORD: squadmind_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U squadmind_user -d squadmind"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: squadmind_redis
    restart: unless-stopped
    command: redis-server --save 20 1 --loglevel warning
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ──────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: squadmind_api
    restart: unless-stopped
    environment:
      - APP_ENV=development
      - DATABASE_URL=postgresql+asyncpg://squadmind_user:squadmind_pass@postgres:5432/squadmind
      - DATABASE_URL_SYNC=postgresql://squadmind_user:squadmind_pass@postgres:5432/squadmind
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # ── Celery Worker ────────────────────────────────────────────────────────────
  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: squadmind_celery
    restart: unless-stopped
    environment:
      - APP_ENV=development
      - DATABASE_URL=postgresql+asyncpg://squadmind_user:squadmind_pass@postgres:5432/squadmind
      - DATABASE_URL_SYNC=postgresql://squadmind_user:squadmind_pass@postgres:5432/squadmind
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    depends_on:
      - redis
      - postgres
    volumes:
      - .:/app
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=2

  # ── Celery Beat (Scheduler) ───────────────────────────────────────────────────
  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: squadmind_beat
    restart: unless-stopped
    environment:
      - APP_ENV=development
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    depends_on:
      - redis
    volumes:
      - .:/app
    command: celery -A app.workers.celery_app beat --loglevel=info

  # ── Flower (Celery Dashboard) ─────────────────────────────────────────────────
  flower:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: squadmind_flower
    restart: unless-stopped
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/1
    ports:
      - "5555:5555"
    depends_on:
      - redis
    command: celery -A app.workers.celery_app flower --port=5555

volumes:
  postgres_data:
  redis_data:
